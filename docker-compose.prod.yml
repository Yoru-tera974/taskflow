# ============================================================
# docker-compose.prod.yml — Déploiement production TaskFlow
# TP Fil Rouge CI/CD — Noel Evan
# Usage : docker-compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

version: '3.8'

services:

  taskflow:
    image: ${REGISTRY:-localhost:5000}/taskflow:${VERSION:-latest}
    container_name: taskflow-prod

    # Stratégie Rolling Update
    deploy:
      replicas: 2
      update_config:
        parallelism: 1          # Une instance à la fois
        delay: 10s              # Attente entre chaque mise à jour
        failure_action: rollback
        order: start-first      # Nouvelle instance démarre avant l'arrêt de l'ancienne
      rollback_config:
        parallelism: 1
        delay: 5s

    ports:
      - '80:8080'

    env_file:
      - .env.prod

    restart: unless-stopped

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
