name: CD — Deploy TaskFlow

# Déclenché à chaque merge sur la branche main
on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: taskflow
  REGISTRY: docker.io/${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  # ------------------------------------------------
  # JOB 1 — Build, Test et Push de l'image Docker
  # ------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'  # Cache automatique des node_modules

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          VERSION=v${{ github.run_number }}
          docker build -t $REGISTRY/$IMAGE_NAME:$VERSION .
          docker tag $REGISTRY/$IMAGE_NAME:$VERSION $REGISTRY/$IMAGE_NAME:latest
          docker push $REGISTRY/$IMAGE_NAME:$VERSION
          docker push $REGISTRY/$IMAGE_NAME:latest
          echo "Image poussée : $REGISTRY/$IMAGE_NAME:$VERSION"

  # ------------------------------------------------
  # JOB 2 — Déploiement automatique sur serveur test
  # ------------------------------------------------
  deploy:
    needs: build-and-push  # Attend la fin du job précédent
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to test server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            VERSION=v${{ github.run_number }}
            REGISTRY=${{ secrets.DOCKERHUB_USERNAME }}

            echo "=== Déploiement TaskFlow $VERSION ==="

            # 1. Pull la nouvelle image
            docker pull $REGISTRY/taskflow:$VERSION

            # 2. Arrêt de l'ancien conteneur (sans interruption du service)
            docker stop taskflow-test 2>/dev/null || echo "Aucun conteneur actif"
            docker rm   taskflow-test 2>/dev/null || true

            # 3. Démarrage du nouveau conteneur
            docker run -d \
              --name taskflow-test \
              --env-file /opt/taskflow/.env.test \
              -p 8080:8080 \
              --restart unless-stopped \
              $REGISTRY/taskflow:$VERSION

            # 4. Health check — attend 5s puis vérifie
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "ÉCHEC Health check : HTTP $HTTP_CODE — rollback !"
              docker stop taskflow-test
              docker run -d --name taskflow-test -p 8080:8080 \
                $REGISTRY/taskflow:v$((${{ github.run_number }} - 1)) || true
              exit 1
            fi

            echo "SUCCESS : TaskFlow $VERSION déployé !"
